name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend:
    name: Backend – install & smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke-test – import app and create tables
        env:
          DATABASE_URL: "sqlite:///./test.db"
          SECRET_KEY: "ci-test-secret-key"
          ALLOWED_ORIGINS: "http://localhost:5173"
        run: |
          python - <<'EOF'
          from app.main import app
          from app.core.database import engine, Base
          Base.metadata.create_all(bind=engine)
          routes = [r.path for r in app.routes]
          assert "/health" in routes, f"expected /health route, got: {routes}"
          assert "/api/auth/register" in routes or any("/auth" in r for r in routes), \
              "auth routes missing"
          print("✅ Backend smoke test passed")
          EOF

      - name: Run existing API tests (offline, skips live calls)
        env:
          DATABASE_URL: "sqlite:///./test.db"
          SECRET_KEY: "ci-test-secret-key"
        run: python -m py_compile test_api.py && echo "✅ test_api.py syntax OK"

  frontend:
    name: Frontend – install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
